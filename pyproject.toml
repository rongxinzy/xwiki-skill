[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xwiki-skill"
version = "0.1.0"
description = "Auto-generated Python client for the XWiki REST API with simulated login support"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "rongxinzy"},
]
keywords = ["xwiki", "rest", "api", "client", "skill"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.9"

[project.urls]
Homepage = "https://github.com/rongxinzy/xwiki-skill"
Issues = "https://github.com/rongxinzy/xwiki-skill/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["xwiki_skill*"]
